name: NPM Publish

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: '22'
      run-build:
        description: Run build before publish
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure npm for OIDC
        run: echo "registry=https://registry.npmjs.org/" > $NPM_CONFIG_USERCONFIG

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        if: ${{ inputs.run-build }}
        run: npm run build

      - name: Version
        id: version
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          CURRENT=$(npm view $PKG_NAME version 2>/dev/null || echo "0.0.0")
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_VERSION=$MAJOR.$MINOR.$((PATCH + 1))
          npm version $NEW_VERSION --no-git-tag-version
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Publish ${{ steps.version.outputs.version }}
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --provenance
