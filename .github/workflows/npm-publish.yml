name: NPM Publish

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        type: string
        default: '22'
      run-tests:
        description: Run tests before publish
        type: boolean
        default: true
      run-build:
        description: Run build before publish
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure npm for OIDC
        run: echo "registry=https://registry.npmjs.org/" > $NPM_CONFIG_USERCONFIG

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Test
        if: ${{ inputs.run-tests }}
        run: npm test

      - name: Build
        if: ${{ inputs.run-build }}
        run: npm run build

      - name: Version
        run: npm version 0.0.${{ github.run_number }} --no-git-tag-version

      - name: Publish
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --provenance
